{% extends "base.html" %}

{% block content %}

<div class="predict-container">

    <h2>Supply Chain Risk Prediction</h2>

    <!-- MANUAL INPUT FORM -->
    <div class="form-card">
        <h3>Manual Input</h3>

        <form method="POST" action="/predict">

            <div class="form-grid">

                <!-- EXISTING FIELDS (UNCHANGED) -->

                <div class="input-group">
                    <label>Supplier Name</label>
                    <input type="text" name="supplier" required>
                </div>

                <div class="input-group">
                    <label>Region</label>
                    <select name="region" required>
                        <option value="" disabled selected>Select Region</option>
                        <option value="0">Asia</option>
                        <option value="1">Europe</option>
                        <option value="2">North America</option>
                        <option value="3">South America</option>
                        <option value="4">Africa</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Transport Mode</label>
                    <select name="transport">
                        <option value="0">Truck</option>
                        <option value="1">Ship</option>
                        <option value="2">Air</option>
                        <option value="3">Rail</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Delivery Delay (Days)</label>
                    <input type="number" name="delay" required>
                </div>

                <div class="input-group">
                    <label>Weather Condition</label>
                    <select name="weather">
                        <option value="0">Clear</option>
                        <option value="1">Rain</option>
                        <option value="2">Storm</option>
                        <option value="3">Fog</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Demand Level</label>
                    <select name="demand">
                        <option value="0">Low</option>
                        <option value="1">Medium</option>
                        <option value="2">High</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Inventory Level</label>
                    <input type="number" name="inventory" required>
                </div>

                <div class="input-group">
                    <label>Traffic Level</label>
                    <select name="traffic">
                        <option value="0">Low</option>
                        <option value="1">Medium</option>
                        <option value="2">High</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Port Delay</label>
                    <select name="port_delay">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Order Value</label>
                    <input type="number" name="order_value" required>
                </div>


                <!-- 🔥 NEW FIELDS (ADDED PROPERLY) -->

                <div class="input-group">
                    <label>Supplier Rating (1 - 5)</label>
                    <input type="number" step="0.1" min="1" max="5" name="supplier_rating" required>
                </div>

                <div class="input-group">
                    <label>Lead Time (Days)</label>
                    <input type="number" name="lead_time" required>
                </div>

                <div class="input-group">
                    <label>Stock Status</label>
                    <select name="stock_status">
                        <option value="0">Sufficient</option>
                        <option value="1">Low</option>
                        <option value="2">Out of Stock</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Supplier Reliability</label>
                    <select name="reliability">
                        <option value="0">Poor</option>
                        <option value="1">Average</option>
                        <option value="2">Good</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Distance (KM)</label>
                    <input type="number" name="distance" required>
                </div>

                <div class="input-group">
                    <label>Fuel Cost Index</label>
                    <input type="number" step="0.1" name="fuel_cost" required>
                </div>

            </div>

            <button type="submit" class="predict-btn">Predict Risk</button>

        </form>
    </div>

    <!-- FILE UPLOAD -->
    <div class="form-card">
        <h3>Upload CSV / Excel</h3>

        <form method="POST" action="/predict" enctype="multipart/form-data">
            <div class="input-group">
                <input type="file" name="file" accept=".csv, .xlsx" required>
            </div>

            <button type="submit" class="upload-btn">Upload & Predict</button>
        </form>
    </div>

</div>

{% endblock %}
